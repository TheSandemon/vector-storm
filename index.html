<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VECTOR STORM</title>
<link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Mono:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  overflow: hidden;
  font-family: 'Space Mono', monospace;
  user-select: none;
}
canvas {
  display: block;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
}
#ui {
  position: fixed;
  top: 0; left: 0; right: 0;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  z-index: 10;
  background: linear-gradient(to bottom, rgba(10,10,10,0.95) 0%, transparent 100%);
  pointer-events: none;
  flex-wrap: wrap;
}
#ui > * { pointer-events: auto; }
h1 {
  font-family: 'Syncopate', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: #D4A853;
  letter-spacing: 3px;
  text-shadow: 0 0 20px rgba(212,168,83,0.6);
}
.label {
  font-family: 'Rajdhani', sans-serif;
  font-size: 10px;
  color: #555;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.btn {
  background: rgba(212,168,83,0.06);
  border: 1px solid rgba(212,168,83,0.25);
  color: #D4A853;
  padding: 5px 12px;
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 1px;
}
.btn:hover {
  background: rgba(212,168,83,0.18);
  border-color: #D4A853;
  box-shadow: 0 0 12px rgba(212,168,83,0.3);
}
.btn.active {
  background: rgba(212,168,83,0.22);
  border-color: #D4A853;
  box-shadow: 0 0 15px rgba(212,168,83,0.4);
}
.slider-wrap {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.slider-wrap label {
  font-size: 9px;
  color: #00ff88;
  font-family: 'Rajdhani', sans-serif;
  text-transform: uppercase;
  letter-spacing: 1px;
}
input[type=range] {
  -webkit-appearance: none;
  width: 80px;
  height: 3px;
  background: rgba(0,255,136,0.15);
  border-radius: 2px;
  outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: #00ff88;
  box-shadow: 0 0 6px rgba(0,255,136,0.7);
  cursor: pointer;
}
.info-display {
  font-size: 9px;
  color: #888;
  font-family: 'Rajdhani', sans-serif;
  letter-spacing: 1px;
}
.info-display span { color: #00ff88; }
.damage-bar {
  width: 60px; height: 4px;
  background: rgba(255,255,255,0.1);
  border-radius: 2px;
  overflow: hidden;
}
.damage-fill {
  height: 100%;
  background: linear-gradient(to right, #00ff88, #ffcc00, #ff4466);
  transition: width 0.1s;
  border-radius: 2px;
}
#hint {
  position: fixed;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px;
  color: rgba(212,168,83,0.35);
  letter-spacing: 2px;
  text-align: center;
  pointer-events: none;
  z-index: 10;
}
#shatter-flash {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(255,255,255,0);
  pointer-events: none;
  z-index: 5;
  transition: background 0.05s;
}
</style>
</head>
<body>
<div id="shatter-flash"></div>
<canvas id="c"></canvas>
<div id="ui">
  <h1>VECTOR STORM</h1>
  <span class="label">SPAWN</span>
  <button class="btn active" id="btn-tri" onclick="setShape('tri')">TRI</button>
  <button class="btn" id="btn-quad" onclick="setShape('quad')">QUAD</button>
  <button class="btn" id="btn-hex" onclick="setShape('hex')">HEX</button>
  <button class="btn" id="btn-star" onclick="setShape('star')">STAR</button>
  <span class="label" style="margin-left:6px">MODE</span>
  <button class="btn active" id="btn-drag" onclick="setMode('drag')">DRAG</button>
  <button class="btn" id="btn-attract" onclick="setMode('attract')">ATTRACT</button>
  <button class="btn" id="btn-repel" onclick="setMode('repel')">REPEL</button>
  <button class="btn" id="btn-gravity" onclick="setMode('gravity')">GRAVITY</button>
  <span class="slider-wrap">
    <label>SIZE</label>
    <input type="range" id="sSize" min="20" max="120" value="50">
  </span>
  <span class="slider-wrap">
    <label>GLOW</label>
    <input type="range" id="sGlow" min="1" max="40" value="15">
  </span>
  <span class="slider-wrap">
    <label>GRAVITY</label>
    <input type="range" id="sGrav" min="0" max="100" value="0">
  </span>
  <span class="slider-wrap">
    <label>SENSITIVITY</label>
    <input type="range" id="sSens" min="1" max="20" value="8">
  </span>
  <button class="btn" onclick="clearAll()" style="margin-left:4px">CLEAR</button>
  <span class="info-display">MAX VEL: <span id="maxVel">0.0</span></span>
  <span class="info-display">COLLISIONS: <span id="colCount">0</span></span>
  <span class="info-display" id="count">0 shapes</span>
</div>
<div id="hint">CLICK TO SPAWN &nbsp;|&nbsp; DRAG TO THROW &nbsp;|&nbsp; COLLISIONS DAMAGE SHAPES &nbsp;|&nbsp; SPACE TO CLEAR</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const shatterFlash = document.getElementById('shatter-flash');
let W, H, cx, cy;

let shakeX = 0, shakeY = 0;
let shakeDecay = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2; cy = H / 2;
}
resize();
window.addEventListener('resize', resize);

// Stars background
const stars = [];
function initStars() {
  for (let i = 0; i < 200; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      size: Math.random() * 1.5 + 0.3,
      alpha: Math.random() * 0.4 + 0.1
    });
  }
}
initStars();

// State
let shapes = [];
let particles = [];
let debris = []; // small fragments from damaged shapes
let sparks = []; // collision sparks
let dragged = null;
let dragOffX = 0, dragOffY = 0;
let mouseX = 0, mouseY = 0;
let currentShape = 'tri';
let currentMode = 'drag';
let sizeMult = 1;
let glowMult = 1;
let gravMult = 0;
let sensMult = 1;
let mouseDown = false;
let mouseDownX = 0, mouseDownY = 0;
let collisionCount = 0;
let maxVel = 0;
let lastMaxVel = 0;

const shatterThreshold = 7.5; // speed at which shapes shatter
const damageThreshold = 4.5;  // speed at which shapes start taking damage

function setShape(s) {
  currentShape = s;
  document.querySelectorAll('#btn-tri,#btn-quad,#btn-hex,#btn-star').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + s).classList.add('active');
}
function setMode(m) {
  currentMode = m;
  document.querySelectorAll('#btn-drag,#btn-attract,#btn-repel,#btn-gravity').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + m).classList.add('active');
}

document.getElementById('sSize').addEventListener('input', e => { sizeMult = e.target.value / 50; });
document.getElementById('sGlow').addEventListener('input', e => { glowMult = e.target.value / 15; });
document.getElementById('sGrav').addEventListener('input', e => { gravMult = e.target.value / 100; });
document.getElementById('sSens').addEventListener('input', e => { sensMult = e.target.value / 8; });

function createPoly(x, y, type, vx, vy, scale) {
  scale = scale || 1;
  const size = 50 * sizeMult * scale;
  let sides, radius;
  switch(type) {
    case 'tri': sides = 3; radius = size; break;
    case 'quad': sides = 4; radius = size * 0.8; break;
    case 'hex': sides = 6; radius = size * 0.9; break;
    case 'star': sides = 5; radius = size; break;
    default: sides = 3; radius = size;
  }
  const verts = [];
  for (let i = 0; i < sides; i++) {
    const angle = (i / sides) * Math.PI * 2 - Math.PI / 2;
    let r = radius;
    if (type === 'star') r = (i % 2 === 0) ? radius : radius * 0.4;
    verts.push({ x: Math.cos(angle) * r, y: Math.sin(angle) * r });
  }
  const colors = ['#D4A853','#00ff88','#ff4466','#44aaff','#ff88ff','#ffcc00'];
  const color = colors[Math.floor(Math.random() * colors.length)];
  return {
    x, y, vx, vy, verts, color, alpha: 1, rotation: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.04,
    trail: [], size,
    damage: 0, // 0 to 1
    scale,
    type,
    originalColor: color,
    wobble: 0, // vertex jitter from damage
    flash: 0   // white flash on hit
  };
}

function spawnShape(x, y) {
  const vx = (Math.random() - 0.5) * 2;
  const vy = (Math.random() - 0.5) * 2;
  shapes.push(createPoly(x, y, currentShape, vx, vy));
  updateCount();
}

function flashScreen() {
  shatterFlash.style.background = 'rgba(255,255,255,0.08)';
  setTimeout(() => { shatterFlash.style.background = 'rgba(255,255,255,0)'; }, 60);
}

function shake(intensity) {
  shakeX = (Math.random() - 0.5) * intensity;
  shakeY = (Math.random() - 0.5) * intensity;
  shakeDecay = intensity;
}

function spawnSparks(x, y, color, count, speedMult) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = (Math.random() * 6 + 2) * speedMult;
    sparks.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: Math.random() * 0.06 + 0.04,
      size: Math.random() * 2.5 + 0.5,
      color
    });
  }
  // White hot core
  for (let i = 0; i < 6; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 8 + 3;
    sparks.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1, decay: 0.1,
      size: Math.random() * 1.5 + 0.5,
      color: '#ffffff'
    });
  }
}

function shatter(shape, skipParticles) {
  const count = Math.floor(shape.verts.length * 2 + shape.size * 0.3);
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 5 + 1.5;
    const color = shape.color;
    particles.push({
      x: shape.x + (Math.random() - 0.5) * shape.size,
      y: shape.y + (Math.random() - 0.5) * shape.size,
      vx: Math.cos(angle) * speed + shape.vx * 0.2,
      vy: Math.sin(angle) * speed + shape.vy * 0.2,
      life: 1,
      decay: Math.random() * 0.018 + 0.012,
      size: Math.random() * 3 + 1,
      color
    });
  }
  // Debris fragments
  const debrisCount = Math.floor(3 + shape.scale * 2);
  for (let i = 0; i < debrisCount; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 3 + 0.5;
    debris.push({
      x: shape.x, y: shape.y,
      vx: Math.cos(angle) * speed + shape.vx * 0.3,
      vy: Math.sin(angle) * speed + shape.vy * 0.3,
      life: 1,
      decay: Math.random() * 0.008 + 0.005,
      size: Math.random() * 6 + 3,
      color: shape.color,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.15
    });
  }
  if (!skipParticles) {
    flashScreen();
    shake(8 * shape.scale);
    spawnSparks(shape.x, shape.y, shape.color, 15, 1.2);
  }
}

function damageShape(shape, impactSpeed) {
  const dmg = (impactSpeed - damageThreshold) / (shatterThreshold - damageThreshold) * 0.35;
  if (dmg > 0) {
    shape.damage = Math.min(1, shape.damage + dmg);
    shape.flash = 1;
    shape.wobble = shape.damage * 4;
    // Damage color shift: bright -> red-tinted
    if (shape.damage > 0.5) {
      const t = (shape.damage - 0.5) * 2;
      shape.color = lerpColor(shape.originalColor, '#ff2222', t * 0.6);
    }
  }
}

function lerpColor(a, b, t) {
  const ah = parseInt(a.slice(1), 16);
  const bh = parseInt(b.slice(1), 16);
  const ar = (ah >> 16) & 0xff, ag = (ah >> 8) & 0xff, ab = ah & 0xff;
  const br = (bh >> 16) & 0xff, bg = (bh >> 8) & 0xff, bb = bh & 0xff;
  const rr = Math.round(ar + (br - ar) * t);
  const rg = Math.round(ag + (bg - ag) * t);
  const rb = Math.round(ab + (bb - ab) * t);
  return '#' + ((1 << 24) + (rr << 16) + (rg << 8) + rb).toString(16).slice(1);
}

function updateCount() {
  document.getElementById('count').textContent = shapes.length + ' shape' + (shapes.length !== 1 ? 's' : '');
}

// Collision between two shapes
function checkCollision(a, b) {
  const dx = a.x - b.x;
  const dy = a.y - b.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  return dist < (a.size + b.size) * 0.75;
}

function update() {
  const g = 0.15 * gravMult;

  // Decay shake
  if (shakeDecay > 0) {
    shakeX *= 0.85;
    shakeY *= 0.85;
    shakeDecay *= 0.85;
    if (shakeDecay < 0.2) { shakeX = 0; shakeY = 0; shakeDecay = 0; }
  }

  // Apply mode forces
  for (let i = 0; i < shapes.length; i++) {
    const s = shapes[i];
    if (s === dragged) continue;

    if (currentMode === 'attract') {
      const dx = cx - s.x, dy = cy - s.y;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      s.vx += (dx / dist) * 0.08 * sensMult;
      s.vy += (dy / dist) * 0.08 * sensMult;
    } else if (currentMode === 'repel') {
      const dx = s.x - cx, dy = s.y - cy;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      s.vx += (dx / dist) * 0.15 * sensMult;
      s.vy += (dy / dist) * 0.15 * sensMult;
    }
  }

  let newMaxVel = 0;

  for (let i = shapes.length - 1; i >= 0; i--) {
    const s = shapes[i];
    if (s === dragged) continue;

    s.vy += g;
    s.vx *= 0.997;
    s.vy *= 0.997;
    s.x += s.vx;
    s.y += s.vy;
    s.rotation += s.rotSpeed;

    // Damage decay
    s.damage *= 0.992;
    s.flash *= 0.8;
    s.wobble *= 0.92;

    // Track max velocity
    const vel = Math.sqrt(s.vx*s.vx + s.vy*s.vy);
    if (vel > newMaxVel) newMaxVel = vel;

    // Trail
    s.trail.push({ x: s.x, y: s.y });
    if (s.trail.length > 20) s.trail.shift();

    // Bounce
    const margin = s.size * 0.7;
    if (s.x < margin) { s.x = margin; s.vx = Math.abs(s.vx) * 0.65; }
    if (s.x > W - margin) { s.x = W - margin; s.vx = -Math.abs(s.vx) * 0.65; }
    if (s.y < margin) { s.y = margin; s.vy = Math.abs(s.vy) * 0.65; }
    if (s.y > H - margin) { s.y = H - margin; s.vy = -Math.abs(s.vy) * 0.65; }

    // Shape collisions
    for (let j = i + 1; j < shapes.length; j++) {
      const s2 = shapes[j];
      if (s === dragged || s2 === dragged) continue;
      if (checkCollision(s, s2)) {
        const dx = s.x - s2.x;
        const dy = s.y - s2.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        const nx = dx / dist, ny = dy / dist;
        const relV = (s.vx - s2.vx) * nx + (s.vy - s2.vy) * ny;
        if (relV < 0) {
          collisionCount++;
          const impactSpeed = Math.abs(relV);
          const imp = -relV * 0.75;
          s.vx += nx * imp; s.vy += ny * imp;
          s2.vx -= nx * imp; s2.vy -= ny * imp;
          // Separate
          const overlap = (s.size + s2.size) * 0.75 - dist;
          if (overlap > 0) {
            s.x += nx * overlap * 0.5; s.y += ny * overlap * 0.5;
            s2.x -= nx * overlap * 0.5; s2.y -= ny * overlap * 0.5;
          }
          // Apply damage from impact
          damageShape(s, impactSpeed);
          damageShape(s2, impactSpeed);
          // Spawn sparks on impact
          const impactX = (s.x + s2.x) / 2;
          const impactY = (s.y + s2.y) / 2;
          spawnSparks(impactX, impactY, '#ffffff', Math.floor(impactSpeed * 1.5), 0.8);
          if (impactSpeed > 3) shake(impactSpeed * 0.5);
          // Check for shatter
          const sSpeed = Math.sqrt(s.vx*s.vx + s.vy*s.vy);
          const s2Speed = Math.sqrt(s2.vx*s2.vx + s2.vy*s2.vy);
          const combinedSpeed = (sSpeed + s2Speed) / 2;
          // Shatter if damaged AND high speed, or just very high speed
          if (s.damage > 0.5 && impactSpeed > damageThreshold) {
            shatter(s);
            spawnSparks(s.x, s.y, s.color, 8, 1);
            shapes.splice(i, 1); j--;
            updateCount();
            continue;
          } else if (s2.damage > 0.5 && impactSpeed > damageThreshold) {
            shatter(s2);
            spawnSparks(s2.x, s2.y, s2.color, 8, 1);
            shapes.splice(j, 1);
            continue;
          } else if (combinedSpeed > shatterThreshold * 1.1) {
            // Clean high-speed shatter
            shatter(s);
            shatter(s2);
            spawnSparks(impactX, impactY, '#ffffff', 10, 1.5);
            shapes.splice(j, 1); shapes.splice(i, 1);
            updateCount();
            break;
          }
        }
      }
    }
  }

  if (newMaxVel > lastMaxVel + 0.1) {
    maxVel = newMaxVel;
    lastMaxVel = newMaxVel;
  }
  maxVel *= 0.99;

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += g * 0.3;
    p.vx *= 0.98; p.vy *= 0.98;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Debris
  for (let i = debris.length - 1; i >= 0; i--) {
    const d = debris[i];
    d.x += d.vx; d.y += d.vy;
    d.vy += g * 0.2;
    d.vx *= 0.99; d.vy *= 0.99;
    d.rotation += d.rotSpeed;
    d.life -= d.decay;
    if (d.life <= 0) debris.splice(i, 1);
  }

  // Sparks
  for (let i = sparks.length - 1; i >= 0; i--) {
    const p = sparks[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.95; p.vy *= 0.95;
    p.life -= p.decay;
    if (p.life <= 0) sparks.splice(i, 1);
  }

  // Update HUD
  document.getElementById('maxVel').textContent = maxVel.toFixed(1);
  document.getElementById('colCount').textContent = collisionCount;
}

function drawPoly(verts, x, y, rotation, color, size, alpha, glow, wobble) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x, y);
  ctx.rotate(rotation);

  ctx.shadowBlur = glow;
  ctx.shadowColor = color;
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.beginPath();
  verts.forEach((v, i) => {
    const wx = wobble ? (Math.random() - 0.5) * wobble : 0;
    const wy = wobble ? (Math.random() - 0.5) * wobble : 0;
    if (i === 0) ctx.moveTo(v.x + wx, v.y + wy);
    else ctx.lineTo(v.x + wx, v.y + wy);
  });
  ctx.closePath();
  ctx.stroke();

  // Fill
  ctx.fillStyle = color + '18';
  ctx.fill();

  ctx.restore();
}

function drawDamageIndicator(shape) {
  if (shape.damage < 0.15) return;
  const t = shape.damage;
  ctx.save();
  ctx.translate(shape.x, shape.y);
  ctx.globalAlpha = t * 0.6;
  ctx.strokeStyle = '#ff2222';
  ctx.lineWidth = 1;
  ctx.setLineDash([3, 4]);
  ctx.beginPath();
  ctx.arc(0, 0, shape.size * 1.1, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function draw() {
  ctx.save();
  if (shakeX || shakeY) ctx.translate(shakeX, shakeY);

  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(-10, -10, W + 20, H + 20);

  // Stars
  stars.forEach(s => {
    ctx.globalAlpha = s.alpha;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  const glow = 15 * glowMult;

  // Trails
  shapes.forEach(s => {
    if (s.trail.length < 2) return;
    ctx.save();
    for (let i = 1; i < s.trail.length; i++) {
      const t = s.trail[i];
      const prev = s.trail[i - 1];
      ctx.globalAlpha = (i / s.trail.length) * 0.12;
      ctx.strokeStyle = s.color;
      ctx.lineWidth = 1;
      ctx.shadowBlur = 3;
      ctx.shadowColor = s.color;
      ctx.beginPath();
      ctx.moveTo(prev.x, prev.y);
      ctx.lineTo(t.x, t.y);
      ctx.stroke();
    }
    ctx.restore();
  });

  // Damage rings
  shapes.forEach(s => drawDamageIndicator(s));

  // Shapes
  shapes.forEach(s => {
    if (s !== dragged) {
      const flashAmt = s.flash;
      const col = flashAmt > 0.1 ? lerpColor(s.color, '#ffffff', flashAmt * 0.7) : s.color;
      drawPoly(s.verts, s.x, s.y, s.rotation, col, s.size, s.alpha, glow + s.flash * 10, s.wobble);
    }
  });

  // Dragged on top
  if (dragged) {
    drawPoly(dragged.verts, dragged.x, dragged.y, dragged.rotation, '#ffffff', dragged.size, 1, glow * 2.5, 0);
  }

  // Debris
  debris.forEach(d => {
    ctx.save();
    ctx.globalAlpha = d.life * 0.8;
    ctx.translate(d.x, d.y);
    ctx.rotate(d.rotation);
    ctx.shadowBlur = 5;
    ctx.shadowColor = d.color;
    ctx.strokeStyle = d.color;
    ctx.lineWidth = 1;
    ctx.strokeRect(-d.size/2, -d.size/2, d.size, d.size);
    ctx.fillStyle = d.color + '20';
    ctx.fillRect(-d.size/2, -d.size/2, d.size, d.size);
    ctx.restore();
  });

  // Particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.shadowBlur = 6;
    ctx.shadowColor = p.color;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  });

  // Sparks (on top)
  sparks.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.shadowBlur = 10;
    ctx.shadowColor = p.color;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  });

  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
  ctx.restore();
}

function getShapeAt(x, y) {
  for (let i = shapes.length - 1; i >= 0; i--) {
    const s = shapes[i];
    const dx = x - s.x, dy = y - s.y;
    if (Math.sqrt(dx*dx + dy*dy) < s.size * 1.2) return s;
  }
  return null;
}

canvas.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  mouseDown = true;
  mouseDownX = e.clientX;
  mouseDownY = e.clientY;
  const shape = getShapeAt(e.clientX, e.clientY);
  if (shape) {
    dragged = shape;
    dragOffX = e.clientX - shape.x;
    dragOffY = e.clientY - shape.y;
    canvas.style.cursor = 'grabbing';
  } else {
    spawnShape(e.clientX, e.clientY);
  }
});

canvas.addEventListener('mousemove', e => {
  mouseX = e.clientX; mouseY = e.clientY;
  if (dragged) {
    dragged.x = e.clientX - dragOffX;
    dragged.y = e.clientY - dragOffY;
    dragged.trail = [];
  } else {
    const shape = getShapeAt(e.clientX, e.clientY);
    canvas.style.cursor = shape ? 'grab' : 'crosshair';
  }
});

canvas.addEventListener('mouseup', e => {
  if (dragged && mouseDown) {
    const dx = e.clientX - mouseDownX;
    const dy = e.clientY - mouseDownY;
    dragged.vx = dx * 0.15;
    dragged.vy = dy * 0.15;
  }
  dragged = null;
  mouseDown = false;
  canvas.style.cursor = 'crosshair';
});

canvas.addEventListener('mouseleave', () => {
  dragged = null;
  mouseDown = false;
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  mouseDown = true;
  mouseDownX = t.clientX; mouseDownY = t.clientY;
  const shape = getShapeAt(t.clientX, t.clientY);
  if (shape) {
    dragged = shape;
    dragOffX = t.clientX - shape.x;
    dragOffY = t.clientY - shape.y;
  } else {
    spawnShape(t.clientX, t.clientY);
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  if (dragged) {
    dragged.x = t.clientX - dragOffX;
    dragged.y = t.clientY - dragOffY;
    dragged.trail = [];
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  if (dragged) {
    const t = e.changedTouches[0];
    dragged.vx = (t.clientX - mouseDownX) * 0.1;
    dragged.vy = (t.clientY - mouseDownY) * 0.1;
  }
  dragged = null;
  mouseDown = false;
});

document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); clearAll(); }
  if (e.code === 'KeyT') setShape('tri');
  if (e.code === 'KeyQ') setShape('quad');
  if (e.code === 'KeyH') setShape('hex');
  if (e.code === 'KeyS') setShape('star');
  if (e.code === 'Digit1') setMode('drag');
  if (e.code === 'Digit2') setMode('attract');
  if (e.code === 'Digit3') setMode('repel');
  if (e.code === 'Digit4') setMode('gravity');
});

function clearAll() {
  shapes.forEach(s => shatter(s));
  shapes = [];
  debris = [];
  particles = [];
  sparks = [];
  collisionCount = 0;
  maxVel = 0;
  lastMaxVel = 0;
  updateCount();
}

// Spawn initial demo shapes
setTimeout(() => {
  for (let i = 0; i < 3; i++) {
    const x = W * 0.3 + Math.random() * W * 0.4;
    const y = H * 0.3 + Math.random() * H * 0.3;
    shapes.push(createPoly(x, y, ['tri','quad','hex','star'][i], (Math.random()-0.5)*3, (Math.random()-0.5)*3));
  }
  updateCount();
}, 500);

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
